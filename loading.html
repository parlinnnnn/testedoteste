<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisando...</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" integrity="sha512-dBl86kEekmwgqbZULksXFVdHc+v3zY7NysGEKMluSleqU9jwELyhl725LLJoPLD114F8CbnMD4PlzyBbs6k8lw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            background: linear-gradient(135deg, #0f2e17, #1a1a1a);
        }
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #25D366;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin:auto;
            margin-top:2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="glass" style="max-width: 420px; margin:auto; margin-top:3rem; text-align:center;">
    <h2>Analisando...</h2>
    <div class="spinner"></div>
    <div id="loadingMessages"></div>
</div>
<script>
const messages = [
    "<i class='fa-solid fa-hourglass-half fa-spin'></i> Analisando informações...",
    "<i class='fa-solid fa-magnifying-glass fa-spin'></i> Rastreando atividade...",
    "<i class='fa-solid fa-comment-dots fa-spin'></i> Coletando dados de mensagens...",
    "<i class='fa-solid fa-compass fa-spin'></i> Verificando localização..."
];

let index = 0;
function showMessage() {
    if(index < messages.length) {
        const p = document.createElement('p');
        p.innerHTML = messages[index];
        document.getElementById('loadingMessages').appendChild(p);
        index++;
        setTimeout(showMessage, 5000);
    }
}
showMessage();
setTimeout(function(){
    window.location.href='results.html';
},15000);
</script>
</body>
</html>
