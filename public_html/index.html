<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Activity Checker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="glass" style="max-width: 420px; margin:auto; margin-top:3rem;">
    <div class="header">
        <img src="https://img.icons8.com/color/48/25D366/whatsapp.png" alt="WhatsApp" width="32" height="32">
        <h1>WA Activity Checker</h1>
    </div>
    <h2>Check WhatsApp Activity</h2>
    <input id="phone" type="tel" placeholder="(99) 99999-9999" style="width:100%; padding:0.5rem; border-radius:0.5rem; margin-top:1rem;" />
    <button id="startBtn" style="width:100%; margin-top:1rem;">Start Investigation</button>
    <div style="margin-top:2rem;">
        <div class="step">1️⃣ Enter number</div>
        <div class="step">2️⃣ Analyze</div>
        <div class="step">3️⃣ View results</div>
    </div>
</div>
<script>
// Save number and go to loading page
 document.getElementById('startBtn').addEventListener('click', function(){
     const phone = document.getElementById('phone').value.trim();
     if(phone){
         localStorage.setItem('wa_number', phone);
         window.location.href = 'loading.html';
     }
 });
</script>
</body>
</html>
