<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyzing...</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .spinner {
            border: 4px solid rgba(0,0,0,0.1);
            border-left-color: #25D366;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 1s linear infinite;
            margin:auto;
            margin-top:2rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="glass" style="max-width: 420px; margin:auto; margin-top:3rem; text-align:center;">
    <h2>Analyzing...</h2>
    <div class="spinner"></div>
    <div id="loadingMessages"></div>
</div>
<script>
const messages = [
    "Checking online status...",
    "Fetching public activity...",
    "Loading results..."
];
let index = 0;
function showMessage() {
    if(index < messages.length) {
        const p = document.createElement('p');
        p.textContent = messages[index];
        document.getElementById('loadingMessages').appendChild(p);
        index++;
        setTimeout(showMessage, 4000);
    }
}
showMessage();
setTimeout(function(){
    window.location.href='results.html';
},15000);
</script>
</body>
</html>
