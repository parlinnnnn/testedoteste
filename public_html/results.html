<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="glass" style="max-width: 420px; margin:auto; margin-top:3rem;">
    <h2 id="phoneHeader"></h2>
    <div>
        <h3>Complete Public Analysis</h3>
        <ul>
            <li>Last seen: <span id="lastSeen">unknown</span></li>
            <li>Status: <span id="status">No status</span></li>
            <li>Group presence: <span id="groups">n/a</span></li>
        </ul>
    </div>
    <div id="geo" style="margin-top:1rem;"></div>
    <!-- Video placeholder: add your own file later -->
    <!-- <video id="promo" src="vsl.mp4" autoplay muted loop style="width:100%; margin-top:1rem; border-radius:0.5rem;"></video> -->
    <!-- <button id="unmuteBtn" style="width:100%; margin-top:0.5rem;">Unmute</button> -->
    <button id="advancedBtn" style="display:none; width:100%;">🔓 Get Advanced Access</button>
</div>
<script>
// Load phone number
const number = localStorage.getItem('wa_number') || 'Unknown';
document.getElementById('phoneHeader').textContent = 'Results for ' + number;
// Fake data
function fake() {
  const lastSeenOptions = ['today at 14:32','yesterday at 20:00','2 days ago'];
  const statusOptions = ['Available','Busy','Battery about to die'];
  const groupOptions = ['3 groups found','No groups','Multiple groups'];
  document.getElementById('lastSeen').textContent = lastSeenOptions[Math.floor(Math.random()*lastSeenOptions.length)];
  document.getElementById('status').textContent = statusOptions[Math.floor(Math.random()*statusOptions.length)];
  document.getElementById('groups').textContent = groupOptions[Math.floor(Math.random()*groupOptions.length)];
}
fake();
// Geolocation
if(navigator.geolocation){
  navigator.geolocation.getCurrentPosition(function(pos){
    const {latitude, longitude} = pos.coords;
    document.getElementById('geo').textContent = `Your location: ${latitude.toFixed(3)}, ${longitude.toFixed(3)}`;
  });
}
// Show advanced button after 30s
setTimeout(function(){
  document.getElementById('advancedBtn').style.display='block';
},30000);
</script>
</body>
</html>
