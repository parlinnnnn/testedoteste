<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resultados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header><i class="fa fa-chart-line"></i><h2>Resultados da verificação</h2></header>
    <p>Número analisado: <strong id="number"></strong></p>
    <div class="cards">
      <div class="card"><i class="fa fa-clock"></i><p>Último status visto</p></div>
      <div class="card"><i class="fa fa-users"></i><p>Grupos detectados</p></div>
      <div class="card"><i class="fa fa-chart-bar"></i><p>Frequência de atividade</p></div>
    </div>
    <div id="geo" class="trust"></div>
    <div class="video-box">
      <video id="promo" src="vsl.mp4" autoplay muted loop></video>
      <button id="unmuteBtn">🔊</button>
    </div>
    <button id="advancedBtn" style="display:none;">Obter Acesso Avançado</button>
  </div>
<script src="script.js"></script>
</body>
</html>
